<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Unsere Speisekarte</title>

  <style>
    body {
      margin: 0;
      padding: 30px;
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f1e8;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .karte {
      width: 100%;
      max-width: 500px;
      padding: 40px;
      box-sizing: border-box;
      background: white;
      border-radius: 16px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin-top: 0;
    }

    p {
      font-size: 18px;
      line-height: 1.5;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      border-radius: 8px;
      background: #222;
      color: white;
      text-decoration: none;
      font-size: 18px;
    }

    .button:hover {
      background: #444;
    }
  </style>
</head>

<body>
  <main class="karte">
    <h1>Willkommen</h1>

    <p>Hier finden Sie unsere aktuelle Speisekarte.</p>

    <a class="button" href="speisekarte.pdf">
      Speisekarte öffnen
    </a>
  </main>
</body>
</html>
